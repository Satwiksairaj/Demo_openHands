<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Library Books Catalog</title>
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Library Books Catalog</h1>
    <form class="row g-3 mb-4">
        <div class="col-auto">
            <input type="text" name="title" class="form-control" placeholder="Search by title" value="{{ request.args.title }}">
        </div>
        <div class="col-auto">
            <input type="text" name="author" class="form-control" placeholder="Search by author" value="{{ request.args.author }}">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Search</button>
        </div>
    </form>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>ISBN</th>
            <th>Genre</th>
            <th>Availability</th>
        </tr>
        </thead>
        <tbody>
        {% for book in books %}
        <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.isbn }}</td>
            <td>{{ book.genre }}</td>
            <td>
                {% if book.available_copies > 0 %}
                <span class="badge bg-success">Available</span>
                {% else %}
                <span class="badge bg-danger">Not Available</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
