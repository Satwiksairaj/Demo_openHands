<!doctype html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href='https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css' rel='stylesheet'>
    <title>Task Statistics</title>
</head>
<body>
<div class='container'>
<h1 class='mt-5'>Task Statistics</h1>
<ul class='list-group mt-3'>
    <li class='list-group-item d-flex justify-content-between align-items-center'>
        Total Tasks
        <span class='badge badge-primary badge-pill'>{{ total_tasks }}</span>
    </li>
    <li class='list-group-item d-flex justify-content-between align-items-center'>
        Open Tasks
        <span class='badge badge-warning badge-pill'>{{ open_tasks }}</span>
    </li>
    <li class='list-group-item d-flex justify-content-between align-items-center'>
        Completed Tasks
        <span class='badge badge-success badge-pill'>{{ completed_tasks }}</span>
    </li>
</ul>
</div>
<script src='https://code.jquery.com/jquery-3.5.1.slim.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js'></script>
<script src='https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js'></script>
</body>
</html>
