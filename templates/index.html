    <title>Expense Tracker</title>
</head>
<body>

    <h1 class="mt-5">Expense Tracker</h1>

                <th>Amount</th>

            </thead>
            <tbody>
            <!-- Expenses will be rendered here -->
            </tbody>
        </table>
    </div>
