<!doctype html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href='https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css' rel='stylesheet'>
    <title>Task Manager</title>
</head>
<body>
<div class='container'>
<h1 class='mt-5'>Task Manager</h1>
<table class='table table-hover mt-3'>
    <thead>
    <tr>
        <th>Title</th>
        <th>Description</th>
        <th>Priority</th>
        <th>Due Date</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    {% for task in tasks %}
    <tr>
        <td>{{ task.title }}</td>
        <td>{{ task.description }}</td>
        <td><span class='badge {{ 'badge-danger' if task.priority == 'high' else 'badge-warning' if task.priority == 'medium' else 'badge-success' }}'>{{ task.priority }}</span></td>
        <td>{{ task.due_date }}</td>
        <td>
            <a href='{{ url_for('complete_task', id=task.id) }}' class='btn btn-sm btn-outline-success'>Complete</a>
            <a href='{{ url_for('delete_task', id=task.id) }}' class='btn btn-sm btn-outline-danger'>Delete</a>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
</div>
<script src='https://code.jquery.com/jquery-3.5.1.slim.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js'></script>
<script src='https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js'></script>
</body>
</html>
