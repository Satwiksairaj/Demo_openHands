version: '3.9'

services:
  agent:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile
    image: ai-dev-agent:latest
    container_name: ai-dev-agent

    # ─── Environment ──────────────────────────────────────────────────────────
    environment:
      # OpenAI / LLM
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # Jira
      - JIRA_BASE_URL=${JIRA_BASE_URL}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}

      # GitHub
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO_URL=${GITHUB_REPO_URL}
      - GITHUB_OWNER=${GITHUB_OWNER}
      - GITHUB_REPO=${GITHUB_REPO}
      - GITHUB_BASE_BRANCH=${GITHUB_BASE_BRANCH:-main}

      # Agent config
      - WORKSPACE_BASE=/workspace
      - TEST_TIMEOUT=${TEST_TIMEOUT:-300}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    # ─── Volumes ──────────────────────────────────────────────────────────────
    volumes:
      - agent-workspace:/workspace
      - agent-logs:/app/logs

    # ─── Security ─────────────────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID

    # ─── Resource limits ──────────────────────────────────────────────────────
    mem_limit: 4g
    cpus: '2.0'

    # ─── Network ──────────────────────────────────────────────────────────────
    # Allow outbound (GitHub, Jira, OpenAI) but no inbound
    networks:
      - agent-net

    # ─── Interactive mode for CLI ─────────────────────────────────────────────
    stdin_open: true
    tty: true

  # ─── MCP Server ─────────────────────────────────────────────────────────────
  mcp-server:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile
    image: ai-dev-agent:latest
    container_name: ai-dev-agent-mcp
    command: ["python3", "-m", "mcp.server"]
    environment:
      - JIRA_BASE_URL=${JIRA_BASE_URL}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    networks:
      - agent-net
    restart: unless-stopped

volumes:
  agent-workspace:
    driver: local
  agent-logs:
    driver: local

networks:
  agent-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
